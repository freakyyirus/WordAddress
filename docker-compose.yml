version: '3.8'

services:
  # ── API Backend ─────────────────────────────────────────
  api:
    build: ./api
    container_name: open3words-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://o3w:o3w_secret@db:5432/open3words
      - WHISPER_URL=http://whisper:9000
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - wordlist-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ──────────────────────────────────────
  web:
    build: ./frontend
    container_name: open3words-web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── PostgreSQL + PostGIS ────────────────────────────────
  db:
    image: postgis/postgis:15-3.4
    container_name: open3words-db
    environment:
      POSTGRES_DB: open3words
      POSTGRES_USER: o3w
      POSTGRES_PASSWORD: o3w_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U o3w -d open3words"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: open3words-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ── Whisper (self-hosted speech-to-text) ────────────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: open3words-whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    restart: unless-stopped

  # ── Ollama (local LLM) ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: open3words-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  # ── Prometheus (optional metrics) ───────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: open3words-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana (optional dashboards) ───────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: open3words-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres-data:
  redis-data:
  ollama-models:
  wordlist-data:
  grafana-data:
