server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing – serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend
    location /encode   { proxy_pass http://api:8000; }
    location /decode   { proxy_pass http://api:8000; }
    location /correct  { proxy_pass http://api:8000; }
    location /autosuggest { proxy_pass http://api:8000; }
    location /voice    { proxy_pass http://api:8000; }
    location /ai       { proxy_pass http://api:8000; }
    location /assistant { proxy_pass http://api:8000; }
    location /health   { proxy_pass http://api:8000; }
    location /precision { proxy_pass http://api:8000; }
    location /languages { proxy_pass http://api:8000; }

    # WebSocket
    location /voice/stream {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
